<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do List</title>
</head>

<body>
    <div class="container">
        <div id="the-header" class="the-header">
            <h1>To-Do List</h1>
            <input type="text" id="the-input" placeholder="Enter or Type Your List Items">
            <span onClick="createNewElement()" class="create-button">Create To-Do</span>
        </div>
    </div>

    <ul id="the-ul">
        <li>Buy Groceries</li>
        <li>Complete Homework</li>
        <li>File Taxes</li>
        <li>Pay Utility Bills</li>
        <li>Get Car Serviced</li>
    </ul>

    <script src="script.js"></script>

</body>

</html>
